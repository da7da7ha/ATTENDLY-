<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISIMM | Espace Professeur</title>
    <link rel="stylesheet" href="main.css">
</head>
<body id="pageBody" class="curtains-closed">
    <div class="curtain curtain-left">
        <img src="assets/logo-universite-monastir.png" alt="Logo Université de Monastir" class="top-left-logo">
        <h1 class="curtain-title left-title">Espace</h1>
    </div>
    <div class="curtain curtain-right">
        <img src="assets/logo-isimm.png" alt="Logo ISIMM" class="top-right-logo">
        <h1 class="curtain-title right-title">Professeur</h1>
    </div>
    <div class="auth-container">
        <div id="loginForm" class="form-box active">
            <h2>CONNEXION</h2>
            <input type="email" id="loginEmail" placeholder="Adresse e-mail">
            <input type="password" id="loginPassword" placeholder="Mot de passe">
            <button class="btn submit-btn" onclick="handleLogin(this)">
                <span class="btn-text">Se Connecter</span>
                <div class="spinner"></div>
            </button>
            <div class="switch-text">
                Nouveau ici ? <span class="switch-link" onclick="toggleForms('signup')">Créer un compte</span>
            </div>
        </div>
        <div id="signupFormStep1" class="form-box">
            <h2>INSCRIPTION</h2>
            <p class="form-description">Entrez votre numéro CIN</p>
            <input type="text" id="signupCIN" placeholder="CIN (8 chiffres)" maxlength="8">
            <button class="btn submit-btn" onclick="checkCIN(this)">
                <span class="btn-text">Continuer</span>
                <div class="spinner"></div>
            </button>
            <div class="switch-text">
                Vous avez déjà un compte ? <span class="switch-link" onclick="toggleForms('login')">Se connecter</span>
            </div>
        </div>
        <div id="signupFormStep2" class="form-box">
            <h2>INSCRIPTION</h2>
            <p class="form-description">Créez votre mot de passe</p>
            <div class="info-field">
                <label>Votre email</label>
                <span id="displayEmail">...</span>
            </div>
            <input type="password" id="signupPassword" placeholder="Mot de passe (min. 8 caractères)">
            <input type="password" id="signupPasswordConfirm" placeholder="Retapez le mot de passe">
            <button class="btn submit-btn" onclick="handleSignup(this)">
                <span class="btn-text">Créer le compte</span>
                <div class="spinner"></div>
            </button>
            <div class="switch-text">
                <span class="switch-link" onclick="backToStep1()">Retour</span>
            </div>
        </div>
    </div>
    <script type="module" src="js/authP.js"></script>
</body>
</html>
